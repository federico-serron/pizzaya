# ============================================================
# PizzaYA Frontend — Nginx SPA Configuration
# ============================================================
server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # ----------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:8000" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ----------------------------------------------------------
    # Cache headers for versioned static assets
    # (Vite builds assets with content hashes in filenames)
    # ----------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ----------------------------------------------------------
    # Health check endpoint
    # ----------------------------------------------------------
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------------------------
    # SPA routing: serve index.html for all unmatched routes
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------
    # Deny access to hidden files (.env, .git, etc.)
    # ----------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ----------------------------------------------------------
    # API proxy to backend (optional — uncomment for production)
    # or use a dedicated nginx reverse proxy in docker-compose
    # ----------------------------------------------------------
    # location /api/ {
    #     proxy_pass http://backend:8000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 60s;
    # }

    # ----------------------------------------------------------
    # Error pages
    # ----------------------------------------------------------
    error_page 404 /index.html;
}
